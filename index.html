<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Word Guess</title>

<script async src="https://www.googletagmanager.com/gtag/js?id=G-12KRFCZR86"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-12KRFCZR86');
</script>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
:root {
  /* Default values that will be overwritten by JavaScript */
  --bg: #050b1a;
  --panel: #0b1630;
  --card: #0f1f45;
  --text: #e8f0ff;
  --muted: #8fa6ff;
  --accent: #3b82f6;
  --accent-soft: #60a5fa;
  --danger: #fb7185;
  --success: #34d399;
  --warning: #f59e0b;
}

* { box-sizing: border-box; }

body {
  margin: 0;
  min-height: 100vh;
  font-family: system-ui, -apple-system, Segoe UI, sans-serif;
  background: radial-gradient(1000px 600px at top, var(--panel), var(--bg));
  color: var(--text);
  overflow-x: hidden;
  transition: background 0.5s ease;
}

/* --- ANIMATIONS --- */
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
@keyframes pop{0%{opacity:0;transform:scale(.6)}15%{opacity:1;transform:scale(1.1)}85%{opacity:1;transform:scale(1)}100%{opacity:0;transform:scale(1.05)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-10px)}75%{transform:translateX(10px)}}
@keyframes glow{0%,100%{box-shadow:0 0 20px rgba(52,211,153,.4)}50%{box-shadow:0 0 40px rgba(52,211,153,.8)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
@keyframes confettiFall{to{transform:translateY(100vh) rotate(360deg);opacity:0}}

/* --- BUTTONS --- */
button { transition: all .3s cubic-bezier(.4,0,.2,1); cursor: pointer; border: none; }
button:hover:not(:disabled) { transform: translateY(-2px); filter: brightness(1.1); }
button:active:not(:disabled) { transform: translateY(0); }

/* --- START SCREEN --- */
.start {
  position: fixed;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 26px;
  background: radial-gradient(900px 500px at center, var(--panel), var(--bg));
  z-index: 100;
}

.start h1 {
  font-size: 68px;
  letter-spacing: 0.1em;
  animation: pulse 2s ease-in-out infinite;
  margin: 0;
}

.start p { max-width: 560px; text-align: center; color: var(--muted); font-size: 18px; }

#startPlayBtn {
  padding: 18px 66px;
  font-size: 22px;
  border-radius: 999px;
  font-weight: 800;
  background: linear-gradient(135deg, var(--accent), var(--accent-soft));
  color: white;
}

/* --- AUTH & UTILS --- */
.google-signin {
  padding: 18px 66px;
  background: linear-gradient(135deg, var(--accent), var(--accent-soft));
  color: white;
  border-radius: 999px;
  font-size: 18px;
  font-weight: 800;
  display: flex;
  align-items: center;
  gap: 10px;
  box-shadow: 0 8px 24px rgba(0,0,0,.4);
}

.google-icon { width: 20px; height: 20px; filter: brightness(0) invert(1); }

.signout-btn {
  position: fixed;
  top: 16px;
  left: 16px;
  padding: 8px 20px;
  background: rgba(255,255,255,.08);
  color: var(--muted);
  border: 1px solid rgba(255,255,255,.15);
  border-radius: 6px;
  font-size: 14px;
  font-weight: 600;
  backdrop-filter: blur(10px);
  z-index: 999;
}

/* --- GAME LAYOUT --- */
.game { display: none; padding: 42px; min-height: 100vh; }
.container { max-width: 1100px; margin: 0 auto; }

.progress-section {
  margin-bottom: 32px;
  background: linear-gradient(180deg, var(--card), var(--panel));
  padding: 24px 34px;
  border-radius: 24px;
  box-shadow: 0 16px 32px rgba(0,0,0,.3);
}

.tier-display {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 20px;
  padding: 16px;
  background: rgba(255,255,255,.05);
  border-radius: 16px;
  border: 2px solid var(--accent);
}

.tier-badge { width: 80px; height: 80px; object-fit: contain; }

.tier-bar {
  width: 100%;
  height: 8px;
  background: rgba(0,0,0,.3);
  border-radius: 999px;
  overflow: hidden;
}

.tier-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--accent-soft));
  transition: width .3s ease;
}

.puzzle-grid {
  display: grid;
  grid-template-columns: 1.3fr .7fr;
  gap: 44px;
  margin-bottom: 32px;
}

.card {
  background: linear-gradient(180deg, var(--card), var(--panel));
  padding: 34px;
  border-radius: 24px;
  box-shadow: 0 32px 64px rgba(0,0,0,.45);
}

input {
  width: 100%;
  padding: 18px;
  font-size: 20px;
  border-radius: 16px;
  border: none;
  outline: none;
  background: #020617;
  color: var(--text);
  text-align: center;
}

.submit { background: var(--accent); color: white; margin-top: 16px; font-weight: 900; padding: 18px; border-radius: 16px; width: 100%; }

/* --- SHOP & COSMETICS --- */
.shop-btn {
  position: fixed;
  top: 16px;
  right: 16px;
  padding: 8px 20px;
  background: linear-gradient(135deg, #f59e0b, #f97316);
  color: white;
  border-radius: 6px;
  font-size: 14px;
  font-weight: 700;
  z-index: 999;
}

/* (Remaining styles for Modals, Streaks, and Achievements would follow the same pattern) */
</style>
</head>

<body>

<div class="start" id="start">
  <h1>WORD GUESS</h1>
  <p>Decode the clues. Follow the rules. Guess the word. Build your streak to unlock powerful abilities!</p>
  
  <button id="startPlayBtn" style="display:none" onclick="startGame()">▶ PLAY SOLO</button>
  
  <button class="google-signin" id="authBtn" onclick="handleAuth()">
    <svg class="google-icon" viewBox="0 0 24 24">
      <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
      <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
      <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
      <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
    </svg>
    <span id="authText">Sign in with Google</span>
  </button>
</div>

<div class="game" id="game">
  <button class="signout-btn" id="signoutBtn" onclick="signOut()">Sign out</button>
  <button class="shop-btn" onclick="openShop()">💰 Shop</button>
  
  <div class="container">
    <div class="progress-section">
      <div class="tier-display">
        <img class="tier-badge" id="tierBadge" src="https://via.placeholder.com/80" alt="Tier">
        <div class="tier-info">
          <div class="tier-name" id="tierName">BRONZE 1</div>
          <div class="tier-bar"><div class="tier-fill" id="tierFill" style="width:20%"></div></div>
        </div>
      </div>
    </div>

    <div class="puzzle-grid">
      <div class="card">
        <div id="clue" class="clue">Clue: A fruit that is usually red or green.</div>
        <div id="counter" class="counter">Guesses left: 5</div>
      </div>
      <div class="card">
        <input id="guess" placeholder="Your guess...">
        <button class="submit" onclick="submitGuess()">Submit</button>
        <div id="message" class="message"></div>
      </div>
    </div>
  </div>
</div>

<script>
/**
 * THEME ENGINE
 * Sets a random vibrant color scheme on every load
 */
function setRandomTheme() {
    const hue = Math.floor(Math.random() * 360);
    const root = document.documentElement;

    // Backgrounds (Darkened HSL)
    root.style.setProperty('--bg', `hsl(${hue}, 45%, 5%)`);
    root.style.setProperty('--panel', `hsl(${hue}, 40%, 10%)`);
    root.style.setProperty('--card', `hsl(${hue}, 35%, 15%)`);
    
    // Accents (Vibrant HSL)
    root.style.setProperty('--accent', `hsl(${hue}, 75%, 55%)`);
    root.style.setProperty('--accent-soft', `hsl(${hue}, 85%, 70%)`);
    root.style.setProperty('--muted', `hsl(${hue}, 30%, 70%)`);
}

// Apply theme immediately
setRandomTheme();

// --- PLACEHOLDERS FOR YOUR FULL LOGIC ---
function handleAuth() {
    // Your Firebase Auth logic
    document.getElementById('authText').innerText = "Logging in...";
    setTimeout(() => {
        document.getElementById('startPlayBtn').style.display = 'block';
        document.getElementById('authBtn').style.display = 'none';
    }, 1000);
}

function startGame() {
    document.getElementById('start').style.display = 'none';
    document.getElementById('game').style.display = 'block';
}

function submitGuess() {
    const val = document.getElementById('guess').value;
    const msg = document.getElementById('message');
    if(val.toLowerCase() === 'apple') {
        msg.style.color = 'var(--success)';
        msg.innerText = "Correct!";
    } else {
        msg.style.color = 'var(--danger)';
        msg.innerText = "Try again!";
    }
}

function signOut() {
    location.reload();
}

function openShop() {
    alert("Shop functionality would open here!");
}
</script>

</body>
</html>
