  /* ==========================================
   PART 2: AUTH & DATA PERSISTENCE (Firebase)
   ========================================== */

// Global User State
let currentUser = null;
let userDocRef = null;

// Auth Handler
async function handleAuth() {
    const provider = new firebase.auth.GoogleAuthProvider();
    try {
        const result = await auth.signInWithPopup(provider);
        currentUser = result.user;
        setupUserSession(currentUser);
    } catch (error) {
        console.error("Auth Error:", error);
        alert("Authentication failed. Please try again.");
    }
}

// Session Setup & Firestore Sync
async function setupUserSession(user) {
    userDocRef = db.collection('users').doc(user.uid);
    
    const doc = await userDocRef.get();
    if (!doc.exists()) {
        // Initialize New User Data
        const initialData = {
            points: 0,
            streak: 0,
            maxStreak: 0,
            tier: 1,
            inventory: {},
            unlockedAchievements: [],
            lastDailyReward: null,
            displayName: user.displayName
        };
        await userDocRef.set(initialData);
        loadUserData(initialData);
    } else {
        loadUserData(doc.data());
    }

    // UI Transitions
    document.getElementById('authBtn').style.display = 'none';
    document.getElementById('startPlayBtn').style.display = 'block';
    document.getElementById('signoutBtn').style.display = 'block';
    document.getElementById('hostBtn').style.display = 'block';
    document.getElementById('joinBtn').style.display = 'block';
    
    // Check for Daily Rewards
    checkDailyReward();
}

// Data Mapping to Game Variables
function loadUserData(data) {
    totalPoints = data.points || 0;
    currentStreak = data.streak || 0;
    currentTier = data.tier || 1;
    userInventory = data.inventory || {};
    
    updateTierUI();
    document.getElementById('totalPoints').innerText = totalPoints;
    document.getElementById('streakDisplay').innerText = currentStreak;
}

// Tier Progression Calculation
const TIER_THRESHOLDS = [0, 500, 1500, 5000, 15000, 50000];
const TIER_NAMES = ["BRONZE 1", "SILVER 1", "GOLD 1", "PLATINUM 1", "DIAMOND 1", "ELITE"];

function updateTierUI() {
    const nextThreshold = TIER_THRESHOLDS[currentTier] || TIER_THRESHOLDS[TIER_THRESHOLDS.length - 1];
    const prevThreshold = TIER_THRESHOLDS[currentTier - 1];
    const progress = ((totalPoints - prevThreshold) / (nextThreshold - prevThreshold)) * 100;

    document.getElementById('tierName').innerText = TIER_NAMES[currentTier - 1];
    document.getElementById('tierFill').style.width = Math.min(progress, 100) + "%";
    
    // Update Badge (Placeholder logic for your specific badge images)
    const badgeImg = document.getElementById('tierBadge');
    if (currentTier === 1) badgeImg.src = "https://i.imgur.com/your-bronze-icon.png";
    if (currentTier === 2) badgeImg.src = "https://i.imgur.com/your-silver-icon.png";
}

// Periodic Sync to Cloud
async function syncData() {
    if (!userDocRef) return;
    try {
        await userDocRef.update({
            points: totalPoints,
            streak: currentStreak,
            tier: currentTier,
            inventory: userInventory
        });
    } catch (e) {
        console.warn("Sync failed, retrying on next action...");
    }
}

function signOut() {
    auth.signOut().then(() => {
        location.reload();
    });
}

   PART 3: CORE GAME ENGINE & CONSTRAINTS
   ========================================== */

let currentPuzzle = null;
let guesses = [];
let maxGuesses = 5;
let usedHint = false;
let activePowers = {
    timedMode: false,
    doublePoints: false
};

// --- PUZZLE INITIALIZATION ---
function nextPuzzle() {
    // Reset state
    guesses = [];
    guessesLeft = maxGuesses;
    usedHint = false;
    document.getElementById('message').innerText = "";
    document.getElementById('guessHistory').innerHTML = "";
    document.getElementById('guess').value = "";
    document.getElementById('guess').disabled = false;
    
    // Select random word from your massive database
    const categoryKeys = Object.keys(wordDatabase);
    const randomCat = categoryKeys[Math.floor(Math.random() * categoryKeys.length)];
    const wordPool = wordDatabase[randomCat];
    const selection = wordPool[Math.floor(Math.random() * wordPool.length)];
    
    currentPuzzle = {
        word: selection.word.toUpperCase(),
        clue: selection.clue,
        category: randomCat,
        constraints: generateConstraints(selection.word.toUpperCase())
    };

    renderPuzzle();
    updateStreakPowers();
}

// --- CONSTRAINT GENERATOR ---
// This builds the "Rules" (e.g., Must contain 'A', Cannot have 'E')
function generateConstraints(word) {
    const letters = word.split('');
    const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split('');
    const notInWord = alphabet.filter(l => !letters.includes(l));
    
    let rules = [];
    
    // Rule 1: Length
    rules.push(`Must be exactly ${word.length} letters long.`);
    
    // Rule 2: Included letter
    const mustHave = letters[Math.floor(Math.random() * letters.length)];
    rules.push(`Must contain the letter '${mustHave}'.`);
    
    // Rule 3: Excluded letter
    const mustNotHave = notInWord[Math.floor(Math.random() * notInWord.length)];
    rules.push(`Cannot contain the letter '${mustNotHave}'.`);

    return rules;
}

function renderPuzzle() {
    document.getElementById('currentCategoryDisplay').innerText = currentPuzzle.category;
    document.getElementById('clue').innerText = `CLUE: ${currentPuzzle.clue}`;
    
    const constraintDiv = document.getElementById('constraints');
    constraintDiv.innerHTML = currentPuzzle.constraints.map(c => `<div>• ${c}</div>`).join('');
    
    document.getElementById('counter').innerText = `Guesses left: ${guessesLeft}`;
}

// --- GUESS VALIDATION ---
function submitGuess() {
    const input = document.getElementById('guess');
    const val = input.value.toUpperCase().trim();
    
    if (!val || val.length === 0) return;

    // Check Constraints
    if (val.length !== currentPuzzle.word.length) {
        showMessage("Wrong length!", "var(--danger)");
        shakeCard();
        return;
    }

    // Process Guess
    processGuessResult(val);
    input.value = "";
}

function processGuessResult(guess) {
    const target = currentPuzzle.word;
    const resultArr = []; // 0: wrong, 1: wrong pos, 2: correct

    if (guess === target) {
        handleWin();
    } else {
        guessesLeft--;
        document.getElementById('counter').innerText = `Guesses left: ${guessesLeft}`;
        addToHistory(guess);
        
        if (guessesLeft <= 0) {
            handleLoss();
        } else {
            showMessage("Incorrect. Keep trying!", "var(--muted)");
            shakeCard();
        }
    }
}

// --- HINT SYSTEM ---
function getHint() {
    if (totalPoints < 50) {
        showMessage("Need 50 points for a hint!", "var(--warning)");
        return;
    }
    
    if (!usedHint) {
        totalPoints -= 50;
        usedHint = true;
        const target = currentPuzzle.word;
        const firstLetter = target[0];
        const lastLetter = target[target.length - 1];
        
        showMessage(`HINT: Starts with ${firstLetter} and ends with ${lastLetter}`, "var(--accent-soft)");
        document.getElementById('totalPoints').innerText = totalPoints;
        syncData();
    }
}

// --- STREAK POWER LOGIC ---
function updateStreakPowers() {
    const p3 = document.getElementById('powerBtn3');
    const p5 = document.getElementById('powerBtn5');
    const p10 = document.getElementById('powerBtn10');

    // Unlock based on current session streak
    if (currentStreak >= 3) { p3.disabled = false; p3.classList.add('unlocked'); }
    if (currentStreak >= 5) { p5.disabled = false; p5.classList.add('unlocked'); }
    if (currentStreak >= 10) { p10.disabled = false; p10.classList.add('unlocked'); }
}

function shakeCard() {
    const card = document.getElementById('puzzleCard');
    card.classList.add('shake');
    setTimeout(() => card.classList.remove('shake'), 500);
}

function showMessage(txt, color) {
    const m = document.getElementById('message');
    m.innerText = txt;
    m.style.color = color;
}

// --- SHOP SYSTEM ---
const SHOP_ITEMS = [
    { id: 'extra_guess', name: 'Extra Guess', price: 200, desc: 'Permanent +1 guess per round' },
    { id: 'double_points', name: 'Point Booster', price: 1000, desc: '2x points for the next 5 rounds' },
    { id: 'skip_word', name: 'Word Skip', price: 500, desc: 'Skip a word without losing your streak' }
];

function openShop() {
    const modal = document.createElement('div');
    modal.className = 'modal active';
    modal.id = 'shopModal';
    
    let shopHTML = `
        <div class="modal-container">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <h2>STORE</h2>
                <button onclick="closeModal('shopModal')" style="background:none; color:var(--text); font-size:24px; cursor:pointer;">&times;</button>
            </div>
            <p style="color:var(--muted)">Balance: <span style="color:var(--success)">${totalPoints}</span> Points</p>
            <div style="display:grid; gap:15px; margin-top:20px;">
    `;

    SHOP_ITEMS.forEach(item => {
        shopHTML += `
            <div class="card" style="display:flex; justify-content:space-between; align-items:center; padding:20px;">
                <div>
                    <div style="font-weight:900;">${item.name}</div>
                    <div style="font-size:12px; color:var(--muted)">${item.desc}</div>
                </div>
                <button onclick="buyItem('${item.id}', ${item.price})" class="submit" style="width:auto; margin:0; padding:10px 20px;">
                    ${item.price} pts
                </button>
            </div>
        `;
    });

    shopHTML += `</div></div>`;
    modal.innerHTML = shopHTML;
    document.body.appendChild(modal);
}

async function buyItem(id, price) {
    if (totalPoints < price) {
        alert("Insufficient points!");
        return;
    }

    totalPoints -= price;
    userInventory[id] = (userInventory[id] || 0) + 1;
    
    // Apply permanent upgrades immediately
    if (id === 'extra_guess') maxGuesses++;
    
    document.getElementById('totalPoints').innerText = totalPoints;
    syncData();
    alert("Purchase successful!");
}

// --- ACHIEVEMENT TRACKER ---
const ACHIEVEMENTS = [
    { id: 'first_win', name: 'First Blood', desc: 'Solve your first word', requirement: () => totalPoints >= 100 },
    { id: 'streak_master', name: 'Hot Streak', desc: 'Reach a 10-word streak', requirement: () => maxStreak >= 10 },
    { id: 'rich', name: 'Tycoon', desc: 'Accumulate 10,000 points', requirement: () => totalPoints >= 10000 }
];

function openAchievements() {
    const modal = document.createElement('div');
    modal.className = 'modal active';
    modal.id = 'achieveModal';
    
    let html = `<div class="modal-container">
        <h2>ACHIEVEMENTS</h2>
        <div style="display:grid; gap:10px; margin-top:20px;">`;

    ACHIEVEMENTS.forEach(ach => {
        const isUnlocked = ach.requirement();
        html += `
            <div class="card" style="opacity: ${isUnlocked ? 1 : 0.4}; border: 1px solid ${isUnlocked ? 'var(--success)' : 'transparent'}">
                <div style="font-weight:900">${ach.name} ${isUnlocked ? '✅' : '🔒'}</div>
                <div style="font-size:12px">${ach.desc}</div>
            </div>
        `;
    });

    html += `</div><button class="submit" onclick="closeModal('achieveModal')">Close</button></div>`;
    modal.innerHTML = html;
    document.body.appendChild(modal);
}

// --- UTILITIES & LISTENERS ---
function closeModal(id) {
    const m = document.getElementById(id);
    if(m) m.remove();
}

// Keyboard Support
document.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
        const activeModal = document.querySelector('.modal');
        if (!activeModal && document.getElementById('game').style.display === 'block') {
            submitGuess();
        }
    }
});

// Initialization on Window Load
window.onload = () => {
    // If auth is already cached by Firebase

        if (user) {
            setupUserSession(user);
        } else {
            document.getElementById('authBtn').style.display = 'flex';
        }
    });
};
